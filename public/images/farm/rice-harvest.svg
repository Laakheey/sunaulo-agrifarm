<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#f3d6a0"/>
  <rect width="800" height="280" fill="#f6e3bd"/>
  <circle cx="180" cy="100" r="55" fill="#e3a23c"/>
  <rect y="280" width="800" height="320" fill="#d9b873"/>
  <path d="M0 320 Q200 300 400 320 T800 320 V600 H0 Z" fill="#c9a45f"/>

  <!-- standing rice rows -->
  <g stroke="#9c7f3a" strokeWidth="2" opacity="0.6">
    <path d="M40 360 V300"/><path d="M90 364 V304"/><path d="M140 358 V298"/>
    <path d="M600 360 V300"/><path d="M650 364 V304"/><path d="M700 358 V298"/>
    <path d="M750 360 V300"/>
  </g>

  <!-- cut bundles -->
  <g fill="#e3a23c" stroke="#9c7f3a" strokeWidth="2">
    <ellipse cx="250" cy="430" rx="40" ry="22" transform="rotate(-8 250 430)"/>
    <ellipse cx="340" cy="450" rx="40" ry="22" transform="rotate(6 340 450)"/>
    <ellipse cx="430" cy="425" rx="40" ry="22" transform="rotate(-4 430 425)"/>
    <ellipse cx="500" cy="460" rx="40" ry="22" transform="rotate(10 500 460)"/>
  </g>

  <!-- people figures -->
  <g fill="#23291d">
    <g transform="translate(300,330)">
      <circle cx="0" cy="0" r="14"/>
      <path d="M0 14 L0 60 M0 30 L-22 50 M0 30 L22 10 M0 60 L-14 100 M0 60 L14 100" stroke="#23291d" strokeWidth="6" fill="none" strokeLinecap="round"/>
    </g>
    <g transform="translate(450,335)">
      <circle cx="0" cy="0" r="14"/>
      <path d="M0 14 L0 60 M0 30 L24 48 M0 30 L-20 12 M0 60 L-14 100 M0 60 L14 100" stroke="#23291d" strokeWidth="6" fill="none" strokeLinecap="round"/>
    </g>
  </g>

  <!-- sacks -->
  <g fill="#fffbf2" stroke="#5a4632" strokeWidth="3">
    <rect x="580" y="470" width="90" height="80" rx="12"/>
    <rect x="660" y="480" width="90" height="70" rx="12"/>
  </g>
</svg>
